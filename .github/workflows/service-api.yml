name: service-api

on:
  push:
    paths:
      - "apps/service-api/**"
  pull_request:
    paths:
      - "apps/service-api/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/service-api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: akademik
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: akademik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://akademik:secret@localhost:5432/akademik_test
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      JWT_SECRET: test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-root

      - name: Lint (ruff)
        run: poetry run ruff check .

      - name: Run tests
        run: poetry run pytest --cov=src --cov-report=term-missing -q
